<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Remove Vehicle | TABAC DRIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root { --color-bg: #0d0d0d; --color-surface: #1c1c1c; --color-surface-raised: #242424; --color-border: rgba(255,255,255,0.08); --color-accent: #ff6b1a; --color-text-primary: #f0ede6; --color-text-secondary: #9a9590; --font-display: 'Cormorant Garamond', serif; --font-body: 'Outfit', sans-serif; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { margin: 0; min-height: 100vh; font-family: var(--font-body); background: radial-gradient(circle at top right, #1b1b1b 0%, var(--color-bg) 45%); color: var(--color-text-primary); display: grid; place-items: center; padding: 1.5rem; }
        a { color: var(--color-accent); text-decoration: none; }
        .card { width: 100%; max-width: 440px; background: linear-gradient(180deg, var(--color-surface-raised), var(--color-surface)); border: 1px solid var(--color-border); border-radius: 8px; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.45); }
        .brand { font-family: var(--font-display); letter-spacing: 0.08em; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .brand span { color: var(--color-accent); }
        h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 600; margin-bottom: 0.5rem; }
        .vehicle-name { color: var(--color-text-secondary); margin-bottom: 1.5rem; }
        .btn-danger { width: 100%; border: none; border-radius: 4px; padding: 0.8rem; background: #dc2626; color: #fff; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; font-family: inherit; }
        .btn-danger:hover { background: #b91c1c; }
        .links { margin-top: 1rem; text-align: center; color: var(--color-text-secondary); font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">TABAC <span>DRIVE</span></div>
    <h1>Remove Vehicle</h1>
    <p class="vehicle-name">{{ vehicle.year }} {{ vehicle.make }} {{ vehicle.model }}</p>
    <p style="font-size:0.9rem; color: var(--color-text-secondary); margin-bottom:1.5rem;">This will permanently remove the vehicle from your fleet. Active reservations will not be affected.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Confirm Remove</button>
    </form>
    <div class="links"><a href="{% url 'provider_fleet' %}">&larr; Cancel</a></div>
</div>
</body>
</html>
