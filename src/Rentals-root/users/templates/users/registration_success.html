<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful | TABAC DRIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap"
          rel="stylesheet"/>
    <style>
        :root {
            --color-bg: #0d0d0d;
            --color-surface: #1c1c1c;
            --color-surface-raised: #242424;
            --color-border: rgba(255, 255, 255, 0.07);
            --color-accent: #ff6b1a;
            --color-accent-hover: #ff8340;
            --color-accent-glow: rgba(255, 107, 26, 0.4);
            --color-text-primary: #f0ede6;
            --color-text-secondary: #9a9590;
            --font-display: 'Cormorant Garamond', Georgia, serif;
            --font-body: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text-primary);
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: var(--color-surface);
            padding: 2rem;
            border-radius: 6px;
            border: 1px solid var(--color-border);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        .section-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: 0.75rem;
        }

        h1 {
            margin: 0;
            font-family: var(--font-display);
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }

        p {
            margin: 1rem 0 0;
            color: var(--color-text-secondary);
            line-height: 1.75;
            font-size: 0.95rem;
        }

        .btn-primary-apex {
            display: inline-block;
            margin-top: 1.8rem;
            padding: 0.9rem 1.8rem;
            background: var(--color-accent);
            color: #0d0d0d;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .btn-primary-apex:hover {
            background: var(--color-accent-hover);
            box-shadow: 0 12px 32px var(--color-accent-glow);
        }

        .text-link {
            display: block;
            margin-top: 1rem;
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 0.88rem;
        }

        .text-link:hover {
            color: var(--color-text-primary);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="section-label">Account Created</div>
    <h1>Registration successful!</h1>
    <p>Your account has been created. Sign in to continue and start booking your next drive.</p>
    <a href="{% url 'login' %}" class="btn-primary-apex">Go to Login</a>
    <a href="{% url 'home' %}" class="text-link">Return to home page</a>
</div>
</body>
</html>
