<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TABAC DRIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #0d0d0d;
            --color-surface: #1c1c1c;
            --color-surface-raised: #242424;
            --color-border: rgba(255, 255, 255, 0.08);
            --color-accent: #ff6b1a;
            --color-accent-hover: #ff8340;
            --color-text-primary: #f0ede6;
            --color-text-secondary: #9a9590;
            --color-error: #ff6b6b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1b1b1b 0%, var(--color-bg) 45%);
            color: var(--color-text-primary);
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: linear-gradient(180deg, var(--color-surface-raised), var(--color-surface));
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        .brand {
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.08em;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .brand span { color: var(--color-accent); }

        h1 {
            margin: 0 0 1.5rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
        }

        .field { margin-bottom: 1rem; }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            margin-bottom: 0.45rem;
        }

        input {
            width: 100%;
            border: 1px solid var(--color-border);
            background: #141414;
            color: var(--color-text-primary);
            border-radius: 4px;
            padding: 0.72rem 0.8rem;
            font-family: inherit;
            font-size: 0.95rem;
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 107, 26, 0.5);
            box-shadow: 0 0 0 3px rgba(255, 107, 26, 0.14);
        }

        .errorlist, .error {
            color: var(--color-error);
            margin: 0.35rem 0 0;
            padding-left: 1.1rem;
            font-size: 0.82rem;
        }

        button {
            width: 100%;
            margin-top: 0.5rem;
            border: none;
            border-radius: 4px;
            padding: 0.8rem;
            background: var(--color-accent);
            color: #0d0d0d;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
        }

        button:hover { background: var(--color-accent-hover); }

        .links {
            margin-top: 1rem;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
            text-align: center;
        }

        a { color: var(--color-accent); text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">TABAC <span>DRIVE</span></div>
    <h1>Sign In</h1>
    <form method="post">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="error">{{ form.non_field_errors }}</div>
        {% endif %}

        <div class="field">
            <label for="{{ form.username.id_for_label }}">Username</label>
            {{ form.username }}
            {{ form.username.errors }}
        </div>

        <div class="field">
            <label for="{{ form.password.id_for_label }}">Password</label>
            {{ form.password }}
            {{ form.password.errors }}
        </div>

        <button type="submit">Sign In</button>
    </form>
    <div class="links">
        No account yet? <a href="{% url 'register' %}">Create one</a>
    </div>
</div>
</body>
</html>
